<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <circle cx="450" cy="100" r="200" fill="#244a82" opacity="0.2" />
  <circle cx="50" cy="550" r="150" fill="#244a82" opacity="0.15" />
  <circle cx="250" cy="300" r="300" fill="none" stroke="#2f5d9e" stroke-width="1" opacity="0.2" />

  <g transform="translate(130, 80)">
    <rect x="20" y="110" width="40" height="90" rx="6" fill="#2f5d9e" opacity="0.6"/>
    <rect x="80" y="60" width="40" height="140" rx="6" fill="#2f5d9e" opacity="0.8"/>
    <rect x="140" y="10" width="40" height="190" rx="6" fill="url(#goldGrad)"/>
    
    <g transform="translate(60, -30)">
      <polygon points="60,10 120,35 60,60 0,35" fill="#0F172A" />
      <path d="M 20,45 L 20,80 A 40,20 0 0,0 100,80 L 100,45" fill="none" stroke="#0F172A" stroke-width="8"/>
      <line x1="120" y1="35" x2="120" y2="75" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
      <circle cx="120" cy="80" r="7" fill="#F59E0B"/>
    </g>

    <path d="M -20,150 L 40,100 L 100,115 L 160,20" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="-20" cy="150" r="7" fill="#FFFFFF" />
    <circle cx="40" cy="100" r="7" fill="#FFFFFF" />
    <circle cx="100" cy="115" r="7" fill="#FFFFFF" />
    <circle cx="160" cy="20" r="9" fill="#FFFFFF" />
  </g>

  <g transform="translate(50, 340)" font-family="'Inter', -apple-system, sans-serif">
    
    <text x="0" y="0" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">
      Welcome to
    </text>
    <text x="0" y="45" font-size="42" font-weight="800" fill="url(#goldGrad)" letter-spacing="-0.02em">
      UniPathway
    </text>
    
    <text x="0" y="90" font-size="18" font-weight="600" fill="#8aa6cc" letter-spacing="0.05em" text-transform="uppercase">
      Your Smart Academic Consultant
    </text>

    <line x1="0" y1="120" x2="60" y2="120" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>

    <text x="0" y="160" font-size="17" font-weight="400" fill="#dde6f2">
      <tspan x="0" dy="0">Take the guesswork out of university admissions.</tspan>
      <tspan x="0" dy="28">Calculate your Sekem scores, compare departments</tspan>
      <tspan x="0" dy="28">side-by-side, and get AI-driven insights to</tspan>
      <tspan x="0" dy="28">maximize your chances of acceptance in Israel.</tspan>
    </text>
  </g>
</svg>
